<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Meus sites favoritos</title>

</head>
<body>
<!-- Título principal da página -->
    <h1>Meus sites favoritos: Seu Nome</h1>
 
    <!-- Linha separadora -->
    <br>
 
    <!-- ==================== SITE 1: YOUTUBE ==================== -->
    <!-- Nome do site como subtítulo -->
    <h2>YouTube</h2>
 
    <!-- Imagem do site com legenda -->
    <figure>
        <!-- Imagem -->
        <img src="Youtube_logo.png"
             alt="Logo do YouTube"
             width="300">
        <!-- Legenda da imagem - importante para motores de busca -->
        <figcaption>Logo do YouTube - plataforma de vídeos</figcaption>
    </figure>
 
    <!-- Link para o site, abre em nova aba com target="_blank" -->
    <a href="https://www.youtube.com" target="_blank">Acessar o YouTube</a>
 
    <!-- Quebra de linha para separar os sites -->
    <br>
    <br>
</body>
</html>
