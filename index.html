<!DOCTYPE html>
<html lang="pt-BR">
 
<head>
    <!-- Configuração de codificação de caracteres UTF-8 para suporte ao português -->
    <meta charset="UTF-8">
    <!-- Configuração de visualização responsiva para diferentes dispositivos -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Compatibilidade com versões antigas do Internet Explorer -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!-- Título exibido na aba do navegador -->

</head>

<!-- Título principal da página -->

    <!-- Nome do site como subtítulo -->
    <h2>YouTube</h2>
 
    <!-- Imagem do site com legenda -->
    <figure>
        <!-- Imagem -->
        <img src="Youtube_logo.png"
             alt="Logo do YouTube"
             width="300">
        <!-- Legenda da imagem - importante para motores de busca -->
        <figcaption>Logo do YouTube - plataforma de vídeos</figcaption>
    </figure>
 
    <!-- Link para o site, abre em nova aba com target="_blank" -->
    <a href="https://www.youtube.com" target="_blank">Acessar o YouTube</a>
